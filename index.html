<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThriftCollector Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
  <div class="app" id="app"></div>

<script src="data.js"></script>
<script>
let currentGroup = null;
let currentMember = null;

// ===== ROUTER =====
function render() {
  const data = DB.get();
  const app = document.getElementById("app");
  
  if(!data.currentUser) {
    app.innerHTML = AuthScreen();
    return;
  }
  
  app.innerHTML = `
    <header>
      <h1>ThriftCollector Pro</h1>
      <div>${data.subscription==='pro'?'<span class="pro-tag">PRO</span>':''} <button onclick="DB.logout();render()" style="background:none;border:none;color:white">Logout</button></div>
    </header>
    ${data.subscription==='free'?`<div class="banner">Free Plan: Max 2 Groups <button onclick="showPaywall()" style="background:var(--green);color:white;border:none;padding:6px 10px;border-radius:6px">Upgrade ₦3,500</button></div>`:''}
    <main id="main"></main>
    <button class="fab" onclick="showAddGroup()">+</button>
    <footer>ThriftCollector Pro is a record-keeping tool. Not a bank. <a href="#" onclick="alert('Privacy: All data stored on your device.')">Privacy</a></footer>
    ${modals()}
  `;
  renderDashboard();
}

function AuthScreen() {
  return `
  <div class="auth-screen">
    <h2>Welcome to ThriftCollector Pro</h2>
    <p>Manage your thrift groups professionally</p>
    <input id="authName" class="input" placeholder="Full Name"/>
    <input id="authEmail" class="input" placeholder="Email"/>
    <input id="authPass" type="password" class="input" placeholder="Password"/>
    <button class="btn btn-green" onclick="handleSignup()">Create Free Account</button>
    <button class="btn btn-outline" onclick="handleLogin()" style="margin-top:10px">I have an account</button>
    <p class="disclaimer">By signing up, you agree to our Terms. Data is stored securely on your device.</p>
  </div>`;
}

// ===== DASHBOARD =====
function renderDashboard() {
  const data = DB.get();
  const main = document.getElementById("main");
  main.innerHTML = data.groups.map(g => `
    <div class="card" onclick="openGroup(${g.id})">
      <h3>${g.name}</h3>
      <p>₦${g.amount.toLocaleString()} ${g.frequency} • ${g.members.length} Members</p>
    </div>
  `).join("") || `<div class="card" style="text-align:center;color:#888">No groups yet. Tap + to create</div>`;
}

// ===== GROUP DETAIL =====
function openGroup(id) {
  currentGroup = DB.get().groups.find(g=>g.id===id);
  document.getElementById("groupName").innerText = currentGroup.name;
  document.getElementById("groupStats").innerText = `₦${currentGroup.amount.toLocaleString()} ${currentGroup.frequency} • ${currentGroup.members.length} Members`;
  document.getElementById("membersList").innerHTML = currentGroup.members.map(m=>`
    <div class="member" onclick="openPayment(${m.id})">
      <div><b>${m.name}</b><br><small>${m.phone} • ${m.bank}</small></div>
      <div class="${m.payments.length?'status-paid':'status-unpaid'}">${m.payments.length?'Paid':'Unpaid'}</div>
    </div>
  `).join("");
  showModal("groupDetail");
}

// ===== ACTIONS =====
function handleSignup() {
  const res = DB.signup(authName.value, authEmail.value, authPass.value);
  if(res.error) alert(res.error); else render();
}
function handleLogin() {
  const res = DB.login(authEmail.value, authPass.value);
  if(res.error) alert(res.error); else render();
}

function markPaid() {
  const data = DB.get();
  const g = data.groups.find(g=>g.id===currentGroup.id);
  const m = g.members.find(m=>m.id===currentMember.id);
  m.payments.push({id: genReceiptId(), amount: currentGroup.amount, method: payMethod.value, bank: bankName.value, date: now()});
  DB.save(data); closeModal("paymentModal"); openGroup(currentGroup.id);
}

function sendWhatsApp() {
  if(DB.getPlan()!=='pro'){showPaywall();return;}
  const msg = msgText.value;
  const numbers = currentGroup.members.map(m=>`234${m.phone.slice(1)}`).join(",");
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
  closeModal("messagePortal");
}

function upgrade() {
  const email = DB.get().currentUser;
  payWithPaystack(email);
}

function showPaywall(){showModal("paywall")}
function showModal(id){document.getElementById(id).classList.remove("hidden")}
function closeModal(id){document.getElementById(id).classList.add("hidden")}

// ===== MODALS HTML =====
function modals() {
  return `
  <div id="groupDetail" class="modal hidden"><div class="modal-content">
    <button onclick="closeModal('groupDetail')">X</button>
    <h2 id="groupName"></h2><p id="groupStats"></p>
    <button class="btn btn-green" onclick="showMessagePortal()">📢 Message All on WhatsApp</button>
    <div id="membersList"></div>
    <button class="btn btn-green" onclick="showAddMember()">+ Add Member</button>
  </div></div>

  <div id="paymentModal" class="modal hidden"><div class="modal-content">
    <button onclick="closeModal('paymentModal')">X</button>
    <h3 id="memberName"></h3><p id="paymentInfo"></p>
    <button class="btn btn-green" id="markPaidBtn">Mark as Paid</button>
    <select id="payMethod" class="input"><option>Bank Transfer</option><option>Cash</option></select>
    <input id="bankName" class="input" placeholder="Bank Name"/>
  </div></div>

  <div id="messagePortal" class="modal hidden"><div class="modal-content">
    <button onclick="closeModal('messagePortal')">X</button>
    <h3>WhatsApp Broadcast <span class="pro-tag">PRO</span></h3>
    <p>Send to <span id="memberCount">0</span> members</p>
    <textarea id="msgText" class="input" rows="4"></textarea>
    <button class="btn btn-green" onclick="sendWhatsApp()">Open WhatsApp</button>
    <p class="disclaimer">You must have consent from members before messaging.</p>
  </div></div>

  <div id="paywall" class="modal hidden"><div class="modal-content" style="text-align:center">
    <h2>Upgrade to Pro</h2><h1 style="color:var(--green)">₦3,500<span style="font-size:16px">/month</span></h1>
    <p>✓ Unlimited Groups<br>✓ No Ads<br>✓ WhatsApp Broadcast<br>✓ PDF Export</p>
    <button class="btn btn-green" onclick="upgrade()">Pay with Paystack</button>
    <button class="btn btn-outline" onclick="closeModal('paywall')">Later</button>
  </div></div>
  `;
}

render();
</script>
</body>
  </html>
